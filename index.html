<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Augusto's City - Prototipo 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Interfaz y Controles Móviles */
        #ui { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; pointer-events: none; padding: 0 30px; box-sizing: border-box; }
        .d-pad, .action-pad { display: grid; gap: 8px; pointer-events: auto; }
        .d-pad { grid-template-areas: ". up ." "left down right"; }
        
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.6); border: 2px solid #333; border-radius: 12px; font-weight: bold; font-size: 20px; display: flex; justify-content: center; align-items: center; user-select: none; }
        .btn:active { background: rgba(255,255,255,1); transform: scale(0.95); }
        
        #btn-up { grid-area: up; } #btn-down { grid-area: down; } #btn-left { grid-area: left; } #btn-right { grid-area: right; }
        
        #btn-shoot { width: 75px; height: 75px; border-radius: 50%; background: rgba(255, 50, 50, 0.8); color: white; margin-top: 40px; font-size: 24px; border: 3px solid darkred;}
        #btn-shoot:active { background: rgba(255, 0, 0, 1); }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 4px rgba(0,0,0,0.5);}
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <div class="d-pad">
            <div class="btn" id="btn-up">W</div>
            <div class="btn" id="btn-left">A</div>
            <div class="btn" id="btn-down">S</div>
            <div class="btn" id="btn-right">D</div>
        </div>
        <div class="action-pad">
            <div class="btn" id="btn-shoot">🔥</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Configuración de la Escena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Cielo azul
        scene.fog = new THREE.Fog(0x87CEEB, 15, 60); // Niebla para ocultar el borde del mapa

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Iluminación
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // 3. Crear el Mapa (Suelo)
        const mapSize = 100;
        const groundGeo = new THREE.PlaneGeometry(mapSize, mapSize);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 }); // Pasto verde
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 4. Crear "Edificios" (Obstáculos del mapa)
        const buildingGeo = new THREE.BoxGeometry(5, 15, 5);
        const buildingMat = new THREE.MeshLambertMaterial({ color: 0x808080 });
        for(let i = 0; i < 20; i++) {
            const building = new THREE.Mesh(buildingGeo, buildingMat);
            // Posiciones aleatorias evitando el centro donde nace el jugador
            let bx = (Math.random() - 0.5) * 80;
            let bz = (Math.random() - 0.5) * 80;
            if(Math.abs(bx) < 10 && Math.abs(bz) < 10) bx += 15; 
            building.position.set(bx, 7.5, bz);
            scene.add(building);
        }

        // 5. Crear a Augusto (Jugador principal)
        const player = new THREE.Group();
        scene.add(player);
        
        // El cuerpo de Augusto
        const bodyGeo = new THREE.BoxGeometry(1.2, 2.5, 1.2);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0xFF3333 }); // Camisa roja
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.25;
        player.add(body);
        
        // Indicador de hacia dónde mira (para saber a dónde dispara)
        const faceGeo = new THREE.BoxGeometry(0.8, 0.4, 1.3);
        const faceMat = new THREE.MeshLambertMaterial({ color: 0xFFCCAA });
        const face = new THREE.Mesh(faceGeo, faceMat);
        face.position.set(0, 2, -0.2);
        player.add(face);

        player.position.set(0, 0, 0);

        // 6. Controles Multiplataforma (PC y Móvil)
        const keys = { w: false, a: false, s: false, d: false };

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            const press = (e) => { e.preventDefault(); keys[key] = true; };
            const release = (e) => { e.preventDefault(); keys[key] = false; };
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        };

        bindBtn('btn-up', 'w'); bindBtn('btn-down', 's');
        bindBtn('btn-left', 'a'); bindBtn('btn-right', 'd');

        // Controles de teclado PC
        window.addEventListener('keydown', (e) => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = false; 
        });

        // 7. Sistema de Armas (Disparar)
        const bullets = [];
        const shootBtn = document.getElementById('btn-shoot');
        
        const fire = (e) => {
            if(e) e.preventDefault();
            const bulletGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xFFFF00 }); // Bala amarilla
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            bullet.position.copy(player.position);
            bullet.position.y += 1.5; // Sale del pecho
            
            // Disparar en la dirección que mira Augusto
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(player.quaternion);
            
            bullet.userData.velocity = direction.multiplyScalar(0.8); // Velocidad de la bala
            scene.add(bullet);
            bullets.push(bullet);
        };

        shootBtn.addEventListener('touchstart', fire, {passive: false});
        shootBtn.addEventListener('mousedown', fire);
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') fire(); });

        // 8. Bucle Principal del Juego (Animación y físicas)
        const speed = 0.2;
        const turnSpeed = 0.05;
        const cameraOffset = new THREE.Vector3(0, 4, 7); // Cámara en tercera persona

        function animate() {
            requestAnimationFrame(animate);

            // Movimiento suave (Estilo tanque para evitar bugs de cámara)
            if (keys.w) player.translateZ(-speed);
            if (keys.s) player.translateZ(speed);
            if (keys.a) player.rotateY(turnSpeed);
            if (keys.d) player.rotateY(-turnSpeed);

            // Límites del mapa (Colisión invisible de bordes)
            const limit = (mapSize / 2) - 1;
            player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
            player.position.z = Math.max(-limit, Math.min(limit, player.position.z));

            // Actualizar cámara (Sigue a Augusto de forma suave)
            const relativeCameraOffset = cameraOffset.clone().applyMatrix4(player.matrixWorld);
            camera.position.lerp(relativeCameraOffset, 0.1); // Interpolación para suavidad
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 2, 0)));

            // Actualizar balas
            for(let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].position.add(bullets[i].userData.velocity);
                // Si la bala llega muy lejos, se destruye para liberar memoria
                if(bullets[i].position.distanceTo(player.position) > 60) {
                    scene.remove(bullets[i]);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
        
        animate(); // Iniciar juego

        // Ajustar pantalla al redimensionar (rotar el celular)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
