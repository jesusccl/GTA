<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Augusto City</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; touch-action:none; }
#c { display:block; width:100vw; height:100vh; }

/* ─── HUD ─── */
#hud { position:fixed; inset:0; pointer-events:none; }

#name-tag {
  position:absolute; top:16px; left:16px;
  color:#FFD700; font-size:22px; font-weight:900;
  text-shadow:0 0 10px #FF6600,2px 2px 0 #000;
  letter-spacing:2px;
}

#score-tag {
  position:absolute; top:16px; right:130px;
  color:#fff; font-size:16px; font-weight:700;
  text-shadow:2px 2px 0 #000;
}

#wanted-wrap {
  position:absolute; top:44px; right:16px;
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
}
#wanted-label { color:#aaa; font-size:10px; letter-spacing:1px; text-transform:uppercase; }
#wanted-stars { font-size:20px; letter-spacing:3px; text-shadow:2px 2px 0 #000; }

/* Health */
#health-wrap {
  position:absolute; bottom:60px; left:16px;
  display:flex; flex-direction:column; gap:4px;
}
#health-label { color:#aaa; font-size:10px; letter-spacing:1px; }
#health-track {
  width:180px; height:14px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:7px; overflow:hidden;
}
#health-bar {
  height:100%; width:100%;
  background:linear-gradient(90deg,#e74c3c,#2ecc71);
  border-radius:7px;
  transition:width 0.15s,background 0.3s;
}

/* Ammo & weapon */
#ammo-wrap {
  position:absolute; bottom:60px; right:130px;
  text-align:right;
}
#weapon-name { color:#FFD700; font-size:13px; font-weight:700; text-shadow:1px 1px 0 #000; }
#ammo-count { color:#fff; font-size:28px; font-weight:900; text-shadow:2px 2px 0 #000; }

/* Crosshair */
#xhair {
  position:absolute; top:50%; left:50%;
  width:24px; height:24px;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#xhair::before,#xhair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.85);
}
#xhair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#xhair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
.xhair-dot {
  position:absolute; top:50%; left:50%;
  width:4px; height:4px; background:#fff;
  border-radius:50%; transform:translate(-50%,-50%);
}

/* Kill feed */
#kill-feed {
  position:absolute; top:80px; right:16px;
  text-align:right; font-size:13px;
  text-shadow:1px 1px 0 #000;
}
#kill-feed div {
  padding:3px 8px;
  background:rgba(0,0,0,0.4);
  border-right:3px solid #e74c3c;
  margin-bottom:3px;
  animation:slideIn .2s ease;
  color:#fff;
}
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* Minimap */
#minimap-wrap {
  position:absolute; bottom:16px; right:16px;
  width:110px; height:110px;
}
#minimap-border {
  width:110px; height:110px;
  border-radius:50%; overflow:hidden;
  border:2px solid rgba(255,255,255,0.4);
  box-shadow:0 0 12px rgba(0,0,0,0.6);
}
#minimap-canvas { width:110px; height:110px; display:block; }
#minimap-arrow {
  position:absolute; top:50%; left:50%;
  width:0; height:0;
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-bottom:10px solid #00AAFF;
  transform-origin:50% 100%; margin-left:-4px; margin-top:-10px;
}

/* Controls hint */
#hint {
  position:absolute; bottom:16px; left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:1px;
  text-shadow:1px 1px 0 #000;
}

/* ─── MOBILE CONTROLS ─── */
#mob-controls {
  position:fixed; inset:0; pointer-events:none;
}

#joystick-zone {
  position:absolute; bottom:70px; left:30px;
  width:120px; height:120px;
  pointer-events:all;
}
#js-base {
  width:120px; height:120px;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.25);
  border-radius:50%;
}
#js-knob {
  position:absolute; top:50%; left:50%;
  width:48px; height:48px;
  background:rgba(255,255,255,0.5);
  border:2px solid rgba(255,255,255,0.8);
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

#btn-shoot {
  position:absolute; bottom:90px; right:40px;
  width:80px; height:80px;
  background:rgba(231,76,60,0.7);
  border:3px solid rgba(255,120,100,0.9);
  border-radius:50%;
  pointer-events:all; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:28px;
  box-shadow:0 0 15px rgba(231,76,60,0.4);
}

#btn-sprint {
  position:absolute; bottom:185px; right:45px;
  width:55px; height:55px;
  background:rgba(52,152,219,0.7);
  border:2px solid rgba(100,180,255,0.9);
  border-radius:50%;
  pointer-events:all; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:20px;
}

/* ─── START SCREEN ─── */
#start-screen {
  position:fixed; inset:0;
  background:linear-gradient(180deg,#0a0a1a 0%,#1a0a00 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:500; color:#fff;
}
.start-title {
  font-size:clamp(36px,8vw,72px); font-weight:900;
  color:#FFD700;
  text-shadow:0 0 30px #FF6600,0 0 60px #FF3300;
  letter-spacing:6px; margin-bottom:6px;
  animation:pulse 2s ease-in-out infinite;
}
.start-sub {
  font-size:clamp(12px,2.5vw,18px); color:#aaa;
  letter-spacing:3px; margin-bottom:40px; text-transform:uppercase;
}
@keyframes pulse { 0%,100%{text-shadow:0 0 30px #FF6600,0 0 60px #FF3300} 50%{text-shadow:0 0 50px #FFD700,0 0 80px #FF6600} }

.start-controls {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:16px 28px; margin-bottom:32px;
  display:grid; grid-template-columns:1fr 1fr; gap:8px 28px;
  font-size:13px; color:#ccc;
}
.ctrl-row span:first-child { color:#FFD700; font-weight:700; }

#btn-play {
  padding:16px 52px; font-size:22px; font-weight:900;
  background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);
  color:#fff; border:none; border-radius:10px; cursor:pointer;
  letter-spacing:3px; text-transform:uppercase;
  box-shadow:0 4px 20px rgba(231,76,60,0.5);
  transition:transform .1s,box-shadow .1s;
}
#btn-play:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(231,76,60,0.3); }

/* ─── DAMAGE FLASH ─── */
#dmg-flash {
  position:fixed; inset:0;
  background:rgba(220,30,30,0.35);
  pointer-events:none; opacity:0;
  transition:opacity 0.35s;
  z-index:400;
}

/* ─── GAME OVER ─── */
#gameover-screen {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.85);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  z-index:600; color:#fff;
}
.go-title { font-size:56px; font-weight:900; color:#e74c3c; margin-bottom:12px; text-shadow:0 0 20px #e74c3c; }
.go-sub   { font-size:20px; color:#aaa; margin-bottom:8px; }
.go-score { font-size:28px; color:#FFD700; margin-bottom:32px; font-weight:900; }
#btn-retry {
  padding:14px 40px; font-size:20px;
  background:#e74c3c; color:#fff; border:none;
  border-radius:8px; cursor:pointer; font-weight:900;
  letter-spacing:2px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="name-tag">⚡ AUGUSTO</div>
  <div id="score-tag">PUNTOS: <span id="score-val">0</span></div>
  <div id="wanted-wrap">
    <div id="wanted-label">SE BUSCA</div>
    <div id="wanted-stars">☆☆☆☆☆</div>
  </div>
  <div id="health-wrap">
    <div id="health-label">SALUD</div>
    <div id="health-track"><div id="health-bar"></div></div>
  </div>
  <div id="ammo-wrap">
    <div id="weapon-name">Sin arma</div>
    <div id="ammo-count"></div>
  </div>
  <div id="xhair"><div class="xhair-dot"></div></div>
  <div id="kill-feed"></div>
  <div id="minimap-wrap">
    <div id="minimap-border">
      <canvas id="minimap-canvas" width="110" height="110"></canvas>
    </div>
    <div id="minimap-arrow"></div>
  </div>
  <div id="hint">WASD mover · Mouse cámara · Clic disparar · E recoger · Shift correr</div>
</div>

<!-- Mobile Controls -->
<div id="mob-controls">
  <div id="joystick-zone">
    <div id="js-base"><div id="js-knob"></div></div>
  </div>
  <div id="btn-shoot">🔫</div>
  <div id="btn-sprint">⚡</div>
</div>

<!-- Damage flash -->
<div id="dmg-flash"></div>

<!-- Start Screen -->
<div id="start-screen">
  <div class="start-title">AUGUSTO CITY</div>
  <div class="start-sub">Open World · San Andreas Style</div>
  <div class="start-controls">
    <div class="ctrl-row"><span>WASD</span><span>Moverse</span></div>
    <div class="ctrl-row"><span>Mouse</span><span>Cámara</span></div>
    <div class="ctrl-row"><span>Clic / F</span><span>Disparar</span></div>
    <div class="ctrl-row"><span>E</span><span>Recoger arma</span></div>
    <div class="ctrl-row"><span>Shift</span><span>Correr</span></div>
    <div class="ctrl-row"><span>R</span><span>Recargar</span></div>
  </div>
  <button id="btn-play" onclick="startGame()">JUGAR</button>
</div>

<!-- Game Over -->
<div id="gameover-screen">
  <div class="go-title">GAME OVER</div>
  <div class="go-sub">Augusto cayó en las calles...</div>
  <div class="go-score" id="go-score-val"></div>
  <button id="btn-retry" onclick="location.reload()">🔄 REINTENTAR</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════ */
let renderer, scene, camera, clock;
let gameRunning = false;
let playerDead = false;

const WORLD = 180; // world half-size
const MAP_SCALE = 110 / (WORLD * 2);

// ─── Input ───
const KEYS = {};
let pointerLocked = false;

// ─── Player state ───
const pState = {
  pos:     new THREE.Vector3(5, 0, 5),
  vel:     new THREE.Vector3(),
  rot:     0,       // facing angle (Y)
  health:  100,
  weapon:  null,    // 'pistol'|'rifle'|'shotgun'
  ammo:    0,
  score:   0,
  wanted:  0,
  wantedT: 0,
  shootCooldown: 0,
  sprint:  false,
  alive:   true
};

// ─── Camera orbit ───
const CAM = {
  theta:  0,        // horizontal
  phi:    0.55,     // vertical
  dist:   9,
  lx: 0, ly: 0     // lerp targets
};

// ─── Three.js objects ───
let playerGroup;
let legL, legR, armL, armR; // animated bones

const buildings = [];   // {minX,maxX,minZ,maxZ}
const enemies   = [];
const pickups   = [];
const bullets   = [];
const particles = [];
const feedMsgs  = [];

// ─── Mobile input ───
const JOY = { active:false, x:0, y:0, tid:null, bx:0, by:0 };
let   camTouch = null;
let   mobileSprint = false;
let   mobileFire   = false;
let   mobileFireTimer = null;

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
function init() {
  const canvas = document.getElementById('c');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference:'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x87CEEB);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x87CEEB, 0.013);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 600);
  clock  = new THREE.Clock(false);

  buildLights();
  buildWorld();
  buildPlayer();
  spawnEnemies(9);
  spawnPickups();
  setupInput();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Hide mobile controls on desktop
  if (!isMobile()) {
    document.getElementById('mob-controls').style.display = 'none';
    document.getElementById('hint').style.display = 'block';
  } else {
    document.getElementById('hint').style.display = 'none';
  }
}

/* ═══════════════════════════════════════════════════
   LIGHTING
═══════════════════════════════════════════════════ */
function buildLights() {
  scene.add(new THREE.AmbientLight(0xffffff, 0.45));

  const sun = new THREE.DirectionalLight(0xFFF8E0, 1.1);
  sun.position.set(60, 100, 40);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const sc = sun.shadow.camera;
  sc.near = 1; sc.far = 350;
  sc.left = sc.bottom = -130;
  sc.right = sc.top = 130;
  scene.add(sun);

  scene.add(new THREE.HemisphereLight(0x87CEEB, 0x4a3520, 0.35));
}

/* ═══════════════════════════════════════════════════
   WORLD BUILDING
═══════════════════════════════════════════════════ */
function buildWorld() {
  // Ground
  const gGeo = new THREE.PlaneGeometry(WORLD*2, WORLD*2);
  const gMat = new THREE.MeshLambertMaterial({ color:0x3a3a3a });
  const gnd  = new THREE.Mesh(gGeo, gMat);
  gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true;
  scene.add(gnd);

  // Main roads
  makeRoad(0, 0, WORLD*2, 16, true);   // horizontal main
  makeRoad(0, 0, WORLD*2, 16, false);  // vertical main
  makeRoad(0,  50, WORLD*2, 10, true);
  makeRoad(0, -50, WORLD*2, 10, true);
  makeRoad( 50, 0, 10, WORLD*2, true);
  makeRoad(-50, 0, 10, WORLD*2, true);

  // Sidewalks
  makeSidewalk( 12, 0, WORLD*2, 4);
  makeSidewalk(-12, 0, WORLD*2, 4);
  makeSidewalk(0,  12, 4, WORLD*2);
  makeSidewalk(0, -12, 4, WORLD*2);

  // ─── Buildings ───
  const BD = [
    // NE block
    { x: 65, z:-65, w:22, d:22, h:28, c:0x5D4037 },
    { x: 80, z:-55, w:12, d:18, h:40, c:0x455A64 },
    { x: 58, z:-80, w:14, d:12, h:20, c:0x795548 },
    { x: 78, z:-80, w:18, d:12, h:16, c:0x9E9E9E },
    // NW block
    { x:-65, z:-65, w:22, d:22, h:34, c:0x37474F },
    { x:-80, z:-55, w:12, d:28, h:44, c:0x2E7D32 },
    { x:-60, z:-80, w:20, d:12, h:18, c:0xBF360C },
    // SE block
    { x: 65, z: 65, w:24, d:20, h:26, c:0x4A148C },
    { x: 58, z: 80, w:14, d:12, h:30, c:0x1565C0 },
    { x: 82, z: 68, w:12, d:20, h:36, c:0x263238 },
    // SW block
    { x:-65, z: 65, w:18, d:22, h:28, c:0xAD1457 },
    { x:-80, z: 58, w:12, d:16, h:22, c:0x00695C },
    { x:-63, z: 82, w:22, d:12, h:35, c:0x4E342E },
    // Mid-ring
    { x: 28, z:-28, w:14, d:14, h:50, c:0x1A237E },
    { x:-28, z:-28, w:14, d:14, h:42, c:0x212121 },
    { x: 28, z: 28, w:14, d:14, h:32, c:0x33691E },
    { x:-28, z: 28, w:14, d:14, h:46, c:0x3E2723 },
    // Outer perimeter
    { x: 90, z:  0, w:12, d:32, h:16, c:0x827717 },
    { x:-90, z:  0, w:12, d:32, h:16, c:0x004D40 },
    { x:  0, z: 90, w:32, d:12, h:16, c:0x880E4F },
    { x:  0, z:-90, w:32, d:12, h:16, c:0x1B5E20 },
    // Corner towers
    { x:110, z:-110, w:18, d:18, h:60, c:0x37474F },
    { x:-110,z:-110, w:18, d:18, h:55, c:0x1A237E },
    { x:110, z: 110, w:18, d:18, h:52, c:0x4A148C },
    { x:-110,z: 110, w:18, d:18, h:58, c:0xAD1457 },
  ];
  BD.forEach(b => makeBuilding(b.x, b.z, b.w, b.d, b.h, b.c));

  // Trees
  const TREES = [
    [10,-8],[-10,-8],[10,8],[-10,8],
    [42,25],[-42,25],[42,-25],[-42,-25],
    [25,42],[-25,42],[25,-42],[-25,-42],
    [35,8],[-35,8],[35,-8],[-35,-8],
    [8,35],[-8,35],[8,-35],[-8,-35],
  ];
  TREES.forEach(([x,z]) => makeTree(x, z));

  // Street lamps
  const LAMPS = [
    [10,10],[-10,10],[10,-10],[-10,-10],
    [36,10],[-36,10],[36,-10],[-36,-10],
    [10,36],[-10,36],[10,-36],[-10,-36],
  ];
  LAMPS.forEach(([x,z]) => makeLamp(x, z));
}

function makeRoad(cx, cz, w, d, horiz) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color:0x2a2a2a })
  );
  m.rotation.x = -Math.PI/2;
  m.position.set(cx, 0.01, cz);
  scene.add(m);

  // Dashes
  const dashLen = horiz ? w : d;
  const step = 10;
  for (let i = -dashLen/2+4; i < dashLen/2; i += step) {
    const dash = new THREE.Mesh(
      new THREE.PlaneGeometry(5, 0.25),
      new THREE.MeshBasicMaterial({ color:0xFFFF00 })
    );
    dash.rotation.x = -Math.PI/2;
    if (horiz) dash.position.set(cx+i, 0.02, cz);
    else        dash.position.set(cx, 0.02, cz+i);
    if (!horiz) dash.rotation.z = Math.PI/2;
    scene.add(dash);
  }
}

function makeSidewalk(cx, cz, w, d) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color:0x888888 })
  );
  m.rotation.x = -Math.PI/2;
  m.position.set(cx, 0.02, cz);
  scene.add(m);
}

function makeBuilding(x, z, w, d, h, color) {
  // Body
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);

  // Rooftop
  const rMesh = new THREE.Mesh(
    new THREE.BoxGeometry(w*0.9, 0.8, d*0.9),
    new THREE.MeshLambertMaterial({ color:0x111111 })
  );
  rMesh.position.set(x, h+0.4, z);
  scene.add(rMesh);

  // Windows (using simple quads)
  const wCols = Math.max(1, Math.floor(w/4));
  const wRows = Math.max(1, Math.floor(h/4));
  const wMat  = new THREE.MeshBasicMaterial({ color: Math.random()>0.3 ? 0xFFFF88 : 0x3355AA, side:THREE.DoubleSide });

  for (let r=0; r<wRows; r++) {
    for (let c=0; c<wCols; c++) {
      if (Math.random() < 0.15) continue; // some dark
      const wGeo = new THREE.PlaneGeometry(1.4, 1.4);
      const wx = x - w/2 + 1.5 + c*(w/wCols);
      const wy = 2 + r*(h/wRows);
      // Front
      const wf = new THREE.Mesh(wGeo, wMat);
      wf.position.set(wx, wy, z+d/2+0.01);
      scene.add(wf);
      // Back
      const wb = wf.clone();
      wb.rotation.y = Math.PI;
      wb.position.z = z-d/2-0.01;
      scene.add(wb);
    }
  }

  // Collision AABB
  buildings.push({ minX:x-w/2, maxX:x+w/2, minZ:z-d/2, maxZ:z+d/2 });
}

function makeTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 3, 6),
    new THREE.MeshLambertMaterial({ color:0x5D4037 })
  );
  trunk.position.set(x, 1.5, z);
  trunk.castShadow = true;
  scene.add(trunk);

  [[3,3,0],[2.2,3,1.6]].forEach(([r,hh,yo]) => {
    const leaf = new THREE.Mesh(
      new THREE.ConeGeometry(r, hh, 7),
      new THREE.MeshLambertMaterial({ color:0x2E7D32 })
    );
    leaf.position.set(x, 3+yo*1.5, z);
    leaf.castShadow = true;
    scene.add(leaf);
  });
}

function makeLamp(x, z) {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.1,5,6),
    new THREE.MeshLambertMaterial({ color:0x777777 })
  );
  pole.position.set(x, 2.5, z);
  scene.add(pole);

/* ═══════════════════════════════════════════════════
   SHOOTING
═══════════════════════════════════════════════════ */
const WEAPON_DATA = {
  pistol:  { dmg:22, cooldown:0.38, color:0xFFFF44 },
  rifle:   { dmg:32, cooldown:0.18, color:0x88FF88 },
  shotgun: { dmg:55, cooldown:0.75, color:0xFF8800 },
};

function doShoot() {
  if (!pState.weapon || !pState.alive) return;
  if (pState.ammo <= 0) { addFeed('¡Sin munición! [R] recargar'); return; }
  if (pState.shootCooldown > 0) return;

  const wd = WEAPON_DATA[pState.weapon];
  pState.ammo--;
  pState.shootCooldown = wd.cooldown;

  const origin = pState.pos.clone().add(new THREE.Vector3(0, 1.4, 0));
  const dir    = new THREE.Vector3(
    -Math.sin(pState.rot) * Math.cos(CAM.phi * 0.4),
    -Math.sin(CAM.phi * 0.4),
    -Math.cos(pState.rot) * Math.cos(CAM.phi * 0.4)
  ).normalize();

  // Shotgun: multiple pellets
  const pellets = pState.weapon === 'shotgun' ? 5 : 1;
  for (let p=0; p<pellets; p++) {
    const spreadDir = dir.clone().add(
      new THREE.Vector3(rng(-1,1), rng(-1,1), rng(-1,1)).multiplyScalar(pState.weapon==='shotgun'?0.08:0.01)
    ).normalize();

    const ray = new THREE.Raycaster(origin, spreadDir, 0, 90);
    enemies.forEach(en => {
      if (!en.alive) return;
      const box = new THREE.Box3().setFromObject(en.group);
      if (ray.ray.intersectsBox(box)) hitEnemy(en, wd.dmg);
    });

    // Bullet trail
    const trail = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 0.8, 4),
      new THREE.MeshBasicMaterial({ color:wd.color, transparent:true, opacity:0.85 })
    );
    trail.position.copy(origin).add(spreadDir.clone().multiplyScalar(2));
    trail.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), spreadDir);
    scene.add(trail);
    bullets.push({ mesh:trail, vel:spreadDir.clone().multiplyScalar(55), pos:origin.clone().add(spreadDir.clone().multiplyScalar(2)), life:0.25 });
  }

  // Muzzle flash
  const fl = new THREE.PointLight(wd.color, 4, 6);
  fl.position.copy(origin);
  scene.add(fl);
  setTimeout(() => scene.remove(fl), 70);

  refreshHUD();
}

function hitEnemy(en, dmg) {
  en.health -= dmg;
  spawnBlood(en.group.position.clone().add(new THREE.Vector3(0,1.2,0)));

  const ratio = Math.max(0, en.health/en.maxHealth);
  en.hbFg.scale.x = ratio;
  en.hbFg.position.x = (ratio-1)*0.5;
  en.hbFg.material.color.setHex(ratio>0.5?0x00CC00:ratio>0.25?0xFFCC00:0xFF2200);

  if (en.health<=0 && en.alive) killEnemy(en);
}

function killEnemy(en) {
  en.alive  = false;
  en.deadT  = 0;
  pState.score += 100;
  pState.wanted = Math.min(5, pState.wanted+1);
  pState.wantedT = 30;
  en.group.rotation.z = Math.PI/2;
  en.group.position.y = -0.5;
  addFeed('💀 Enemigo eliminado  +100');
  document.getElementById('score-val').textContent = pState.score;
  updateWanted();

  // Respawn
  setTimeout(() => {
    if (!en.group.parent) return;
    en.alive = true;
    en.health = en.maxHealth;
    en.group.rotation.z = 0;
    en.group.position.y = 0;
    en.hbFg.scale.x = 1;
    en.hbFg.position.x = 0;
    en.hbFg.material.color.setHex(0x00CC00);
  }, 18000);
}

function spawnBlood(pos) {
  for (let i=0; i<6; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.04+Math.random()*0.08, 4, 4),
      new THREE.MeshBasicMaterial({ color:0xCC0000, transparent:true })
    );
    m.position.copy(pos);
    scene.add(m);
    particles.push({
      mesh:m,
      vel:new THREE.Vector3(rng(-4,4), rng(2,6), rng(-4,4)),
      life:0.9
    });
  }
}

/* ═══════════════════════════════════════════════════
   COLLISION
═══════════════════════════════════════════════════ */
const P_RAD = 0.48;

function resolvePos(newX, newZ) {
  let rx = newX, rz = newZ;

  for (const b of buildings) {
    const cx = Math.max(b.minX, Math.min(rx, b.maxX));
    const cz = Math.max(b.minZ, Math.min(rz, b.maxZ));
    const dx = rx - cx, dz = rz - cz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < P_RAD && dist > 0) {
      const push = P_RAD - dist;
      rx += (dx/dist)*push;
      rz += (dz/dist)*push;
    } else if (dist === 0) {
      // inside: push out nearest wall
      const toL = rx - b.minX, toR = b.maxX - rx;
      const toT = rz - b.minZ, toB = b.maxZ - rz;
      const min4 = Math.min(toL, toR, toT, toB);
      if (min4 === toL) rx = b.minX - P_RAD;
      else if (min4 === toR) rx = b.maxX + P_RAD;
      else if (min4 === toT) rz = b.minZ - P_RAD;
      else                   rz = b.maxZ + P_RAD;
    }
  }

  const BOUND = WORLD - 1;
  rx = Math.max(-BOUND, Math.min(BOUND, rx));
  rz = Math.max(-BOUND, Math.min(BOUND, rz));
  return { x:rx, z:rz };
}

/* ═══════════════════════════════════════════════════
   UPDATE PLAYER
═══════════════════════════════════════════════════ */
function updatePlayer(dt) {
  if (!pState.alive) return;

  // Forward/right vectors from camera angle
  const fwd = new THREE.Vector3(-Math.sin(CAM.theta), 0, -Math.cos(CAM.theta));
  const rgt = new THREE.Vector3( Math.cos(CAM.theta), 0, -Math.sin(CAM.theta));

  let mx=0, mz=0;
  if (KEYS['KeyW']||KEYS['ArrowUp'])    { mx+=fwd.x; mz+=fwd.z; }
  if (KEYS['KeyS']||KEYS['ArrowDown'])  { mx-=fwd.x; mz-=fwd.z; }
  if (KEYS['KeyA']||KEYS['ArrowLeft'])  { mx-=rgt.x; mz-=rgt.z; }
  if (KEYS['KeyD']||KEYS['ArrowRight']) { mx+=rgt.x; mz+=rgt.z; }

  // Joystick override
  if (JOY.active) {
    mx = fwd.x*JOY.y + rgt.x*JOY.x;
    mz = fwd.z*JOY.y + rgt.z*JOY.x;
  }

  const sprinting = KEYS['ShiftLeft']||KEYS['ShiftRight']||mobileSprint;
  const speed = sprinting ? 8.5 : 4.8;
  const moving = mx!==0 || mz!==0;

  if (moving) {
    const len = Math.sqrt(mx*mx + mz*mz);
    mx /= len; mz /= len;

    const nx = pState.pos.x + mx*speed*dt;
    const nz = pState.pos.z + mz*speed*dt;
    const rp = resolvePos(nx, nz);
    pState.pos.x = rp.x;
    pState.pos.z = rp.z;

    // Face direction
    const targetRot = Math.atan2(mx, mz);
    pState.rot = lerpAngle(pState.rot, targetRot, 0.18);

    // Leg animation
    const t = clock.getElapsedTime();
    const spd = sprinting ? 12 : 7;
    legL.rotation.x =  Math.sin(t*spd) * 0.55;
    legR.rotation.x = -Math.sin(t*spd) * 0.55;
    armL.rotation.x = -Math.sin(t*spd) * 0.4;
    armR.rotation.x =  Math.sin(t*spd) * 0.4;
  } else {
    // Return to idle
    legL.rotation.x = lerp(legL.rotation.x, 0, 0.15);
    legR.rotation.x = lerp(legR.rotation.x, 0, 0.15);
    armL.rotation.x = lerp(armL.rotation.x, 0, 0.15);
    armR.rotation.x = lerp(armR.rotation.x, 0, 0.15);
  }

  playerGroup.position.copy(pState.pos);
  playerGroup.rotation.y = pState.rot;

  // Shoot cooldown
  if (pState.shootCooldown > 0) pState.shootCooldown -= dt;

  // Keyboard fire
  if (KEYS['KeyF'] || KEYS['Space']) doShoot();

  // Pickup check (auto-proximity OR E key)
  if (KEYS['KeyE']) KEYS['KeyE'] = false, tryPickup();

  // Auto-pickup on proximity
  pickups.forEach(p => {
    if (!p.active) return;
    const dx = p.x - pState.pos.x, dz = p.z - pState.pos.z;
    if (dx*dx + dz*dz < 2.25) grabPickup(p);
  });

  // Wanted decay
  if (pState.wantedT > 0) {
    pState.wantedT -= dt;
    if (pState.wantedT <= 0 && pState.wanted > 0) {
      pState.wanted--;
      pState.wantedT = 25;
      updateWanted();
    }
  }

  // Reload
  if (KEYS['KeyR'] && pState.weapon) {
    KEYS['KeyR'] = false;
    const ammoGiven = PICKUP_AMMO[pState.weapon] || 20;
    pState.ammo += ammoGiven;
    addFeed('🔄 Recargado');
    refreshHUD();
  }
}

function tryPickup() {
  pickups.forEach(p => {
    if (!p.active) return;
    const dx = p.x - pState.pos.x, dz = p.z - pState.pos.z;
    if (dx*dx + dz*dz < 9) grabPickup(p);
  });
}

function grabPickup(p) {
  p.active = false;
  scene.remove(p.mesh);
  scene.remove(p.ring);

  if (p.type === 'health') {
    pState.health = Math.min(100, pState.health+50);
    addFeed('❤️ Salud recuperada +50');
  } else {
    pState.weapon = p.type;
    pState.ammo  += PICKUP_AMMO[p.type];
    addFeed(`🔫 ${p.type.toUpperCase()} recogida!`);
  }
  refreshHUD();

  setTimeout(() => {
    if (gameRunning) {
      p.active = true;
      scene.add(p.mesh);
      scene.add(p.ring);
    }
  }, 22000);
}

/* ═══════════════════════════════════════════════════
   UPDATE ENEMIES
═══════════════════════════════════════════════════ */
function updateEnemies(dt) {
  const t = clock.getElapsedTime();

  enemies.forEach(en => {
    // Health bar faces camera
    en.hbFg.parent && en.hbFg.parent.lookAt(camera.position);

    if (!en.alive) return;

    const gpos = en.group.position;
    const dist = gpos.distanceTo(pState.pos);

    // State transitions
    if (dist < en.alertDist)  en.state = 'chase';
    else if (dist > en.alertDist*1.6) en.state = 'patrol';

    if (en.state === 'chase') {
      if (dist > 3.2) {
        const dir = new THREE.Vector3().subVectors(pState.pos, gpos).normalize();
        const np  = gpos.clone().add(dir.clone().multiplyScalar(en.speed*dt));
        np.y = 0;

        // Simple building check for enemy
        let blocked = false;
        for (const b of buildings) {
          const cx = Math.max(b.minX, Math.min(np.x, b.maxX));
          const cz = Math.max(b.minZ, Math.min(np.z, b.maxZ));
          const dx = np.x-cx, dz = np.z-cz;
          if (dx*dx+dz*dz < 0.36) { blocked=true; break; }
        }
        if (!blocked) gpos.copy(np);
        en.group.lookAt(new THREE.Vector3(pState.pos.x, gpos.y, pState.pos.z));
      }

      // Shoot
      if (dist < en.shootDist) {
        en.shootT += dt;
        if (en.shootT >= en.shootInterval) {
          en.shootT = 0;
          enemyFire(en, dist);
        }
      }
    } else {
      // Patrol
      const pd = gpos.distanceTo(en.patrolPt);
      if (pd < 1.5) {
        en.patrolPt.set(rng(-80,80), 0, rng(-80,80));
      } else {
        const dir = new THREE.Vector3().subVectors(en.patrolPt, gpos).normalize();
        gpos.add(dir.multiplyScalar(en.speed*0.45*dt));
        gpos.y = 0;
        en.group.lookAt(en.patrolPt);
      }
    }
  });
}

function enemyFire(en, dist) {
  if (!pState.alive) return;
  // Accuracy decreases with distance
  const acc = Math.max(0.08, 0.6 - dist/40);
  if (Math.random() < acc) {
    const dmg = 8 + Math.floor(Math.random()*6);
    pState.health -= dmg;
    pState.health = Math.max(0, pState.health);
    refreshHUD();
    showDamageFlash();
    if (pState.health <= 0) triggerDeath();
  }
}

/* ═══════════════════════════════════════════════════
   UPDATE CAMERA
═══════════════════════════════════════════════════ */
function updateCamera() {
  const tx = pState.pos.x + CAM.dist*Math.sin(CAM.theta)*Math.cos(CAM.phi);
  const ty = pState.pos.y + CAM.dist*Math.sin(CAM.phi) + 1.8;
  const tz = pState.pos.z + CAM.dist*Math.cos(CAM.theta)*Math.cos(CAM.phi);

  camera.position.lerp(new THREE.Vector3(tx,ty,tz), 0.12);
  camera.lookAt(pState.pos.x, pState.pos.y+1.2, pState.pos.z);
}

/* ═══════════════════════════════════════════════════
   UPDATE PICKUPS & PARTICLES & BULLETS
═══════════════════════════════════════════════════ */
function updateWorld(dt, t) {
  // Pickups float & spin
  pickups.forEach(p => {
    if (!p.active) return;
    p.mesh.rotation.y += 0.025;
    p.mesh.position.y = 0.5 + Math.sin(t*2.5 + p.x*0.3)*0.12;
    p.ring.rotation.z = t*0.8;
  });

  // Bullets
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.pos.addScaledVector(b.vel, dt);
    b.mesh.position.copy(b.pos);
    b.mesh.material.opacity = b.life*3;
    if (b.life<=0) { scene.remove(b.mesh); bullets.splice(i,1); }
  }

  // Blood particles
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vel.y -= 12*dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.mesh.position.y<0) p.mesh.position.y=0;
    p.mesh.material.opacity = p.life;
    if (p.life<=0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  // Feed timers
  for (let i=feedMsgs.length-1; i>=0; i--) {
    feedMsgs[i].t -= dt;
    if (feedMsgs[i].t<=0) feedMsgs.splice(i,1);
  }
  renderFeed();
}

/* ═══════════════════════════════════════════════════
   MINIMAP
═══════════════════════════════════════════════════ */
const mmCtx = document.getElementById('minimap-canvas').getContext('2d');
const MM = 110;

function drawMinimap() {
  const s = MM / (WORLD*2);
  const ox = WORLD * s;
  const oz = WORLD * s;

  mmCtx.clearRect(0,0,MM,MM);

  // Ground
  mmCtx.fillStyle = '#2a2a2a';
  mmCtx.fillRect(0,0,MM,MM);

  // Roads
  mmCtx.fillStyle = '#1a1a1a';
  [[ox-MM/2*s, oz-8*s, MM, 16*s],[ox-8*s, oz-MM/2*s, 16*s, MM]].forEach(r =>
    mmCtx.fillRect(r[0],r[1],r[2],r[3])
  );

  // Buildings
  mmCtx.fillStyle = '#555';
  buildings.forEach(b => {
    const bx=(b.minX+WORLD)*s, bz=(b.minZ+WORLD)*s;
    const bw=(b.maxX-b.minX)*s, bd=(b.maxZ-b.minZ)*s;
    mmCtx.fillRect(bx, bz, bw, bd);
  });

  // Pickups
  pickups.forEach(p => {
    if (!p.active) return;
    mmCtx.fillStyle = p.type==='health'?'#00FF44':'#FFD700';
    mmCtx.fillRect((p.x+WORLD)*s-1, (p.z+WORLD)*s-1, 3, 3);
  });

  // Enemies
  mmCtx.fillStyle = '#FF4444';
  enemies.forEach(en => {
    if (!en.alive) return;
    const ex=(en.group.position.x+WORLD)*s;
    const ez=(en.group.position.z+WORLD)*s;
    mmCtx.beginPath();
    mmCtx.arc(ex, ez, 2.5, 0, Math.PI*2);
    mmCtx.fill();
  });

  // Player
  const px=(pState.pos.x+WORLD)*s, pz=(pState.pos.z+WORLD)*s;
  mmCtx.fillStyle = '#00AAFF';
  mmCtx.beginPath();
  mmCtx.arc(px, pz, 4, 0, Math.PI*2);
  mmCtx.fill();

  // Update minimap arrow rotation
  document.getElementById('minimap-arrow').style.transform =
    `translate(-50%, -100%) rotate(${pState.rot}rad)`;
}

/* ═══════════════════════════════════════════════════
   HUD HELPERS
═══════════════════════════════════════════════════ */
function refreshHUD() {
  const hp = Math.max(0, pState.health);
  document.getElementById('health-bar').style.width = hp+'%';
  document.getElementById('health-bar').style.background =
    hp>60 ? 'linear-gradient(90deg,#2ecc71,#27ae60)' :
    hp>30 ? 'linear-gradient(90deg,#f39c12,#e67e22)' :
            'linear-gradient(90deg,#e74c3c,#c0392b)';

  const wn = document.getElementById('weapon-name');
  const am = document.getElementById('ammo-count');
  if (pState.weapon) {
    wn.textContent = '🔫 ' + pState.weapon.toUpperCase();
    am.textContent = pState.ammo;
  } else {
    wn.textContent = '[E] Recoger arma';
    am.textContent = '';
  }
}

function updateWanted() {
  const w = pState.wanted;
  document.getElementById('wanted-stars').textContent = '★'.repeat(w)+'☆'.repeat(5-w);
  document.getElementById('wanted-stars').style.color = w>=4?'#FF4444':w>=2?'#FFD700':'#fff';
}

function addFeed(msg) {
  feedMsgs.unshift({ text:msg, t:3.5 });
  if (feedMsgs.length>5) feedMsgs.length=5;
}

function renderFeed() {
  document.getElementById('kill-feed').innerHTML =
    feedMsgs.map(m =>
      `<div style="opacity:${Math.min(1,m.t/0.8)}">${m.text}</div>`
    ).join('');
}

function showDamageFlash() {
  const f = document.getElementById('dmg-flash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity='0', 120);
}

/* ═══════════════════════════════════════════════════
   DEATH / GAME OVER
═══════════════════════════════════════════════════ */
function triggerDeath() {
  pState.alive = false;
  refreshHUD();
  setTimeout(() => {
    const gs = document.getElementById('gameover-screen');
    gs.style.display = 'flex';
    document.getElementById('go-score-val').textContent = `Puntuación: ${pState.score}`;
  }, 1200);
}

/* ═══════════════════════════════════════════════════
   INPUT SETUP
═══════════════════════════════════════════════════ */
function setupInput() {
  // Keyboard
  document.addEventListener('keydown', e => {
    KEYS[e.code] = true;
    if (e.code==='KeyF') doShoot();
  });
  document.addEventListener('keyup', e => { KEYS[e.code] = false; });

  // Mouse: pointer lock for desktop
  document.getElementById('c').addEventListener('click', () => {
    if (!isMobile() && gameRunning) {
      document.getElementById('c').requestPointerLock();
    }
  });
  document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === document.getElementById('c');
  });
  document.addEventListener('mousemove', e => {
    if (!pointerLocked) return;
    CAM.theta -= e.movementX * 0.0028;
    CAM.phi    = Math.max(0.12, Math.min(1.25, CAM.phi - e.movementY * 0.0028));
  });
  document.addEventListener('mousedown', e => {
    if (e.button===0 && pointerLocked) doShoot();
  });

  // Mobile
  setupMobile();
}

function setupMobile() {
  const jZone = document.getElementById('joystick-zone');
  const jKnob = document.getElementById('js-knob');
  const JRAD  = 36;

  function jStart(e) {
    e.preventDefault();
    const t = e.changedTouches[0];
    const r = jZone.getBoundingClientRect();
    JOY.bx = r.left + r.width/2;
    JOY.by = r.top  + r.height/2;
    JOY.tid = t.identifier;
    JOY.active = true;
  }

  jZone.addEventListener('touchstart', jStart, { passive:false });

  document.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === JOY.tid) {
        const dx = t.clientX - JOY.bx, dy = t.clientY - JOY.by;
        const len = Math.sqrt(dx*dx+dy*dy);
        const nx = len>JRAD ? dx/len*JRAD : dx;
        const ny = len>JRAD ? dy/len*JRAD : dy;
        JOY.x = nx/JRAD;
        JOY.y = -ny/JRAD;
        jKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
      }
      if (camTouch && t.identifier === camTouch.tid) {
        const ddx = t.clientX - camTouch.lx;
        const ddy = t.clientY - camTouch.ly;
        CAM.theta -= ddx * 0.005;
        CAM.phi = Math.max(0.12, Math.min(1.25, CAM.phi - ddy * 0.005));
        camTouch.lx = t.clientX;
        camTouch.ly = t.clientY;
      }
    }
  }, { passive:false });

  document.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === JOY.tid) {
        JOY.active = false; JOY.x = 0; JOY.y = 0; JOY.tid = null;
        jKnob.style.transform = 'translate(-50%,-50%)';
      }
      if (camTouch && t.identifier === camTouch.tid) camTouch = null;
    }
  }, { passive:false });

  // Camera drag: right half of canvas
  document.getElementById('c').addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      if (t.clientX > window.innerWidth*0.42 && !camTouch) {
        camTouch = { tid: t.identifier, lx: t.clientX, ly: t.clientY };
      }
    }
  }, { passive:true });

  // Fire button
  const btnShoot = document.getElementById('btn-shoot');
  btnShoot.addEventListener('touchstart', e => {
    e.preventDefault();
    doShoot();
    mobileFireTimer = setInterval(doShoot, 280);
  }, { passive:false });
  btnShoot.addEventListener('touchend', () => { clearInterval(mobileFireTimer); });

  // Sprint button
  document.getElementById('btn-sprint').addEventListener('touchstart', e => {
    e.preventDefault(); mobileSprint = true;
  }, { passive:false });
  document.getElementById('btn-sprint').addEventListener('touchend', () => mobileSprint = false);
}

/* ═══════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════ */
function loop() {
  if (!gameRunning) return;
  requestAnimationFrame(loop);

  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.getElapsedTime();

  updatePlayer(dt);
  updateEnemies(dt);
  updateCamera();
  updateWorld(dt, t);
  drawMinimap();

  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════ */
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  gameRunning = true;
  clock.start();
  refreshHUD();
  updateWanted();
  addFeed('👋 ¡Bienvenido, Augusto!');
  addFeed('🔫 Busca armas brillantes en el suelo');
  loop();
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function lerp(a, b, t) { return a + (b-a)*t; }
function rng(a, b) { return a + Math.random()*(b-a); }
function lerpAngle(a, b, t) {
  let d = b-a;
  while (d> Math.PI) d-=Math.PI*2;
  while (d<-Math.PI) d+=Math.PI*2;
  return a + d*t;
}
function isMobile() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
}

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
init();
</script>
