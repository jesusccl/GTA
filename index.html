<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Augusto City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
        canvas { display: block; }
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #money { position: absolute; top: 15px; left: 15px; color: #00ff88; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #health-wrap { position: absolute; bottom: 160px; left: 15px; width: 180px; }
        #health-label { color: #ff4444; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        #health-bg { background: rgba(0,0,0,0.6); border: 2px solid #ff4444; border-radius: 8px; height: 16px; margin-top: 3px; overflow: hidden; }
        #health-fill { background: linear-gradient(90deg,#ff4444,#ff8888); height: 100%; width: 100%; border-radius: 6px; transition: width 0.2s; }
        #armor-wrap { position: absolute; bottom: 125px; left: 15px; width: 180px; }
        #armor-label { color: #4488ff; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        #armor-bg { background: rgba(0,0,0,0.6); border: 2px solid #4488ff; border-radius: 8px; height: 16px; margin-top: 3px; overflow: hidden; }
        #armor-fill { background: linear-gradient(90deg,#4488ff,#88aaff); height: 100%; width: 50%; border-radius: 6px; transition: width 0.2s; }
        #weapon-hud { position: absolute; bottom: 160px; right: 15px; background: rgba(0,0,0,0.75); border: 2px solid #ffcc00; border-radius: 10px; padding: 8px 14px; color: #ffcc00; text-align: center; min-width: 110px; }
        #weapon-name { font-size: 13px; margin-bottom: 2px; }
        #ammo-count { font-size: 22px; font-weight: bold; }
        #wanted { position: absolute; top: 15px; right: 15px; display: flex; gap: 4px; }
        .star { font-size: 22px; color: #333; text-shadow: 1px 1px 2px #000; }
        .star.on { color: #ffcc00; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 22px; height: 22px; }
        #crosshair::before { content:''; position:absolute; width:2px; height:22px; background:rgba(255,255,255,0.85); left:50%; transform:translateX(-50%); }
        #crosshair::after { content:''; position:absolute; width:22px; height:2px; background:rgba(255,255,255,0.85); top:50%; transform:translateY(-50%); }
        #minimap { position: absolute; bottom: 15px; left: 15px; width: 130px; height: 130px; border-radius: 50%; border: 2px solid #ffcc00; overflow: hidden; }
        #msg { position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 14px; border: 1px solid #ffcc00; opacity: 0; transition: opacity 0.5s; white-space: nowrap; }
        #controls-hint { position: absolute; top: 55px; left: 15px; color: rgba(255,255,255,0.7); font-size: 11px; line-height: 1.7; background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px; }
        /* Mobile */
        #joy-base { position: fixed; bottom: 25px; left: 25px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 3px solid rgba(255,255,255,0.35); z-index: 20; touch-action: none; }
        #joy-knob { position: absolute; width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.45); border: 2px solid rgba(255,255,255,0.8); top: 50%; left: 50%; transform: translate(-50%,-50%); }
        #cam-zone { position: fixed; top: 0; right: 0; width: 55%; height: 65%; z-index: 19; touch-action: none; }
        #btns { position: fixed; bottom: 25px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 20; }
        .abtn { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 11px; font-weight: bold; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); user-select: none; }
        #btn-fire { background: rgba(220,50,50,0.9); }
        #btn-jump { background: rgba(50,180,50,0.9); }
        #btn-swap { background: rgba(50,50,220,0.9); }
        #btn-run  { background: rgba(220,150,0,0.9); }
        /* Loading */
        #loading { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        #load-title { font-size: 52px; font-weight: bold; color: #ffcc00; letter-spacing: 4px; margin-bottom: 8px; }
        #load-sub { color: #aaa; font-size: 18px; margin-bottom: 35px; }
        #load-bg { width: 280px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        #load-bar { height: 100%; width: 0; background: linear-gradient(90deg,#ffcc00,#ff8800); border-radius: 5px; transition: width 0.3s; }
        #load-tip { margin-top: 15px; color: #666; font-size: 13px; }
        /* Death */
        #dead { position: fixed; inset: 0; background: rgba(120,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: #fff; }
        #dead h1 { font-size: 52px; color: #ff4444; margin-bottom: 15px; }
        #dead p { font-size: 18px; margin-bottom: 25px; }
        #btn-respawn { padding: 14px 38px; background: #ffcc00; color: #000; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading">
    <div id="load-title">AUGUSTO CITY</div>
    <div id="load-sub">Mundo Abierto 3D</div>
    <div id="load-bg"><div id="load-bar"></div></div>
    <div id="load-tip">Iniciando...</div>
</div>

<div id="dead">
    <h1>☠ WASTED</h1>
    <p>Augusto ha caído en combate...</p>
    <button id="btn-respawn">RESPAWNEAR</button>
</div>

<div id="hud">
    <div id="money">$0</div>
    <div id="wanted">
        <span class="star" id="st1">★</span>
        <span class="star" id="st2">★</span>
        <span class="star" id="st3">★</span>
        <span class="star" id="st4">★</span>
        <span class="star" id="st5">★</span>
    </div>
    <div id="crosshair"></div>
    <div id="health-wrap">
        <div id="health-label">❤️ HP: <span id="hp-val">100</span></div>
        <div id="health-bg"><div id="health-fill"></div></div>
    </div>
    <div id="armor-wrap">
        <div id="armor-label">🛡️ Armadura: <span id="armor-val">50</span></div>
        <div id="armor-bg"><div id="armor-fill"></div></div>
    </div>
    <div id="minimap"><canvas id="mm" width="130" height="130"></canvas></div>
    <div id="weapon-hud">
        <div id="weapon-name">Puños</div>
        <div id="ammo-count">∞</div>
    </div>
    <div id="msg"></div>
    <div id="controls-hint">
        WASD: Mover | Mouse: Cámara<br>
        Click: Disparar | Espacio: Saltar<br>
        Shift: Correr | G: Cambiar arma<br>
        R: Recargar | F: Golpe
    </div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="cam-zone"></div>
<div id="btns">
    <button class="abtn" id="btn-fire">🔫<br>FIRE</button>
    <button class="abtn" id="btn-jump">↑<br>JUMP</button>
    <button class="abtn" id="btn-swap">🔄<br>ARMA</button>
    <button class="abtn" id="btn-run">🏃<br>RUN</button>
</div>

<script>
// Cargar Three.js dinámicamente
(function loadThree() {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    s.onload = function() { startGame(); };
    s.onerror = function() {
        // Intentar CDN alternativo
        var s2 = document.createElement('script');
        s2.src = 'https://unpkg.com/three@0.128.0/build/three.min.js';
        s2.onload = function() { startGame(); };
        document.head.appendChild(s2);
    };
    document.head.appendChild(s);
})();

function startGame() {

// ── RENDERER ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 70, 180);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 8, 12);

// ── GAME STATE ────────────────────────────────────────────
const G = {
    hp: 100, maxHp: 100,
    armor: 50, maxArmor: 100,
    money: 0,
    wanted: 0,
    alive: true,
    curWeapon: 0,
    weapons: [
        { name:'Puños',    ammo:Infinity, maxAmmo:Infinity, rate:500,  dmg:20, range:2.8,  type:'melee' },
        { name:'Pistola',  ammo:30,       maxAmmo:30,       rate:400,  dmg:25, range:55,   type:'gun'   },
        { name:'Escopeta', ammo:12,       maxAmmo:12,       rate:900,  dmg:65, range:14,   type:'gun'   },
        { name:'AK-47',    ammo:90,       maxAmmo:90,       rate:110,  dmg:18, range:65,   type:'gun'   }
    ],
    lastShot: 0,
    running: false,
    shooting: false,
    score: 0
};

// ── PLAYER STATE ──────────────────────────────────────────
const P = {
    pos: new THREE.Vector3(0, 0, 0),
    vel: new THREE.Vector3(0, 0, 0),
    rot: 0,
    grounded: true,
    mesh: null,
    // Camera orbit
    camH: 0,
    camV: 0.3,
    camDist: 5.5,
    camHeight: 2.2,
    // Parts for animation
    legL: null, legR: null,
    armL: null, armR: null
};

const SPEED      = 5;
const RUN_SPEED  = 10;
const JUMP_FORCE = 9;
const GRAVITY    = 22;
const RADIUS     = 0.4;
const HEIGHT     = 1.8;

// ── COLLECTIONS ───────────────────────────────────────────
const enemies   = [];
const bullets   = [];
const pickups   = [];
const particles = [];
const colBoxes  = []; // collision boxes for buildings

// ── KEYS & INPUT ──────────────────────────────────────────
const keys = {};
const mouse = { locked: false };

// ── BUILD WORLD ───────────────────────────────────────────
function buildWorld() {

    // Ground
    const gGeo = new THREE.PlaneGeometry(400, 400);
    const gMat = new THREE.MeshLambertMaterial({ color: 0x3d7a34 });
    const ground = new THREE.Mesh(gGeo, gMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Road material
    const roadMat = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
    const swMat   = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
    const markMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

    function makeRoad(x, z, w, d) {
        const r = new THREE.Mesh(new THREE.BoxGeometry(w, 0.05, d), roadMat);
        r.position.set(x, 0.01, z);
        r.receiveShadow = true;
        scene.add(r);
        // dashes
        if (w > d) {
            for (let i = x - w/2 + 4; i < x + w/2; i += 6) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(3, 0.06, 0.25), markMat);
                m.position.set(i, 0.02, z);
                scene.add(m);
            }
            // sidewalks
            const sw1 = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, 1.5), swMat);
            sw1.position.set(x, 0.05, z + d/2 + 0.75);
            scene.add(sw1);
            const sw2 = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, 1.5), swMat);
            sw2.position.set(x, 0.05, z - d/2 - 0.75);
            scene.add(sw2);
        } else {
            for (let i = z - d/2 + 4; i < z + d/2; i += 6) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 3), markMat);
                m.position.set(x, 0.02, i);
                scene.add(m);
            }
            const sw1 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, d), swMat);
            sw1.position.set(x + w/2 + 0.75, 0.05, z);
            scene.add(sw1);
            const sw2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, d), swMat);
            sw2.position.set(x - w/2 - 0.75, 0.05, z);
            scene.add(sw2);
        }
    }

    // Main roads
    makeRoad(0,  0,  120, 8);   // horizontal main
    makeRoad(0,  0,  8, 120);   // vertical main
    makeRoad(35, 0,  50, 6);    // side H
    makeRoad(-35,0,  50, 6);
    makeRoad(0,  35, 6,  50);   // side V
    makeRoad(0, -35, 6,  50);

    // Buildings
    const bData = [
        { x:18,  z:18,  w:10, h:20, d:10, c:0x8B7355 },
        { x:-18, z:18,  w:12, h:14, d:10, c:0x607B8B },
        { x:18,  z:-18, w:10, h:24, d:10, c:0x9B8055 },
        { x:-18, z:-18, w:12, h:16, d:10, c:0x5B6B7B },
        { x:38,  z:38,  w:10, h:12, d:10, c:0xA0522D },
        { x:-38, z:38,  w:10, h:18, d:10, c:0x556B7D },
        { x:38,  z:-38, w:10, h:22, d:10, c:0x6B8B2F },
        { x:-38, z:-38, w:10, h:10, d:10, c:0x8B6914 },
        { x:55,  z:12,  w:14, h:18, d:12, c:0x5F6B7B },
        { x:-55, z:-12, w:14, h:14, d:12, c:0x7B5F6B },
        { x:12,  z:55,  w:10, h:20, d:10, c:0x6B7B5F },
        { x:-12, z:-55, w:10, h:16, d:10, c:0x8B7B5F },
        { x:25,  z:55,  w:8,  h:10, d:8,  c:0xCC8866 },
        { x:-25, z:-55, w:8,  h:12, d:8,  c:0x99AACC },
        { x:55,  z:-25, w:8,  h:16, d:8,  c:0x7799AA },
        { x:-55, z:25,  w:8,  h:14, d:8,  c:0xAA7799 }
    ];
    bData.forEach(b => makeBuilding(b.x, b.z, b.w, b.h, b.d, b.c));

    // Trees
    [
        [9,13],[-9,13],[9,-13],[-9,-13],
        [22,6],[-22,6],[22,-6],[-22,-6],
        [40,40],[-40,40],[40,-40],[-40,-40],
        [60,0],[-60,0],[0,60],[0,-60],
        [28,42],[-28,-42],[42,28],[-42,-28],
        [50,50],[-50,50],[50,-50],[-50,-50]
    ].forEach(([x,z]) => makeTree(x, z));

    // Street lights
    [[12,0],[-12,0],[0,12],[0,-12],
     [24,0],[-24,0],[0,24],[0,-24],
     [12,12],[-12,12],[12,-12],[-12,-12]
    ].forEach(([x,z]) => makeLight(x, z));

    // Spawn pickups
    spawnPickup(6,  0.5,  6,  'health');
    spawnPickup(-6, 0.5,  6,  'ammo');
    spawnPickup(6,  0.5, -6,  'armor');
    spawnPickup(-6, 0.5, -6,  'money');
    spawnPickup(15, 0.5,  0,  'ammo');
    spawnPickup(0,  0.5,  15, 'health');
    spawnPickup(-15,0.5,  0,  'money');
    spawnPickup(0,  0.5, -15, 'armor');

    // Spawn enemies
    spawnEnemy(22,  22);
    spawnEnemy(-22, 22);
    spawnEnemy(22, -22);
    spawnEnemy(-22,-22);
    spawnEnemy(40,   5);
    spawnEnemy(-40, -5);
    spawnEnemy(5,   40);
    spawnEnemy(-5, -40);
}

function makeBuilding(x, z, w, h, d, color) {
    const mat  = new THREE.MeshLambertMaterial({ color });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, h / 2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // store collision box
    const box = new THREE.Box3().setFromObject(mesh);
    colBoxes.push(box);

    // windows
    const winMat = new THREE.MeshLambertMaterial({
        color: Math.random() > 0.5 ? 0xFFFF99 : 0x99CCFF,
        emissive: Math.random() > 0.5 ? 0x886600 : 0x003366,
        emissiveIntensity: 0.6
    });
    for (let wy = 1.5; wy < h - 1; wy += 2.8) {
        for (let wx = -w/2 + 1.2; wx < w/2 - 0.5; wx += 2.2) {
            const win = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.1, 0.06), winMat);
            win.position.set(x + wx, wy, z + d/2 + 0.01);
            scene.add(win);
            const win2 = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.1, 0.06), winMat);
            win2.position.set(x + wx, wy, z - d/2 - 0.01);
            scene.add(win2);
        }
    }
    // roof
    const roofMesh = new THREE.Mesh(
        new THREE.BoxGeometry(w + 0.6, 0.35, d + 0.6),
        new THREE.MeshLambertMaterial({ color: 0x444444 })
    );
    roofMesh.position.set(x, h + 0.17, z);
    scene.add(roofMesh);
}

function makeTree(x, z) {
    const trunkM = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    const leafM  = new THREE.MeshLambertMaterial({ color: 0x228B22 });
    const trunk  = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 1.6, 7), trunkM);
    trunk.position.set(x, 0.8, z);
    trunk.castShadow = true;
    scene.add(trunk);
    const l1 = new THREE.Mesh(new THREE.ConeGeometry(1.6, 3.2, 7), leafM);
    l1.position.set(x, 3.2, z);
    l1.castShadow = true;
    scene.add(l1);
    const l2 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2.6, 7), leafM);
    l2.position.set(x, 5, z);
    scene.add(l2);
}

function makeLight(x, z) {
    const poleM = new THREE.MeshLambertMaterial({ color: 0x777777 });
    const pole  = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 5.5, 7), poleM);
    pole.position.set(x, 2.75, z);
    scene.add(pole);
    const bulbM = new THREE.MeshLambertMaterial({ color: 0xFFFF88, emissive: 0xFFFF44, emissiveIntensity: 1 });
    const bulb  = new THREE.Mesh(new THREE.SphereGeometry(0.22, 7, 7), bulbM);
    bulb.position.set(x, 5.6, z);
    scene.add(bulb);
    const pl = new THREE.PointLight(0xFFFF88, 0.9, 14);
    pl.position.set(x, 5.6, z);
    scene.add(pl);
}

// ── CREATE PLAYER ─────────────────────────────────────────
function createPlayer() {
    const g = new THREE.Group();

    const skinM  = new THREE.MeshLambertMaterial({ color: 0xD2956A });
    const shirtM = new THREE.MeshLambertMaterial({ color: 0x1a1a2e });
    const pantsM = new THREE.MeshLambertMaterial({ color: 0x1a3a6e });
    const shoeM  = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const capM   = new THREE.MeshLambertMaterial({ color: 0x111111 });

    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.82, 0.32), shirtM);
    body.position.y = 0.85;
    body.castShadow = true;
    g.add(body);

    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.42, 0.42), skinM);
    head.position.y = 1.46;
    head.castShadow = true;
    g.add(head);

    // Cap
    const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.13, 8), capM);
    cap.position.y = 1.69;
    g.add(cap);
    const brim = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.05, 0.22), capM);
    brim.position.set(0, 1.63, 0.18);
    g.add(brim);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.24, 0.62, 0.24);
    const legL = new THREE.Mesh(legGeo, pantsM);
    const legR = new THREE.Mesh(legGeo, pantsM);
    legL.position.set(-0.18, 0.31, 0);
    legR.position.set( 0.18, 0.31, 0);
    legL.castShadow = true;
    legR.castShadow = true;
    g.add(legL); g.add(legR);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.2, 0.58, 0.2);
    const armL = new THREE.Mesh(armGeo, shirtM);
    const armR = new THREE.Mesh(armGeo, shirtM);
    armL.position.set(-0.45, 0.82, 0);
    armR.position.set( 0.45, 0.82, 0);
    armL.castShadow = true;
    armR.castShadow = true;
    g.add(armL); g.add(armR);

    // Shoes
    const shoeGeo = new THREE.BoxGeometry(0.24, 0.13, 0.32);
    const shoeL = new THREE.Mesh(shoeGeo, shoeM);
    const shoeR = new THREE.Mesh(shoeGeo, shoeM);
    shoeL.position.set(-0.18, 0.065, 0.04);
    shoeR.position.set( 0.18, 0.065, 0.04);
    g.add(shoeL); g.add(shoeR);

    P.legL = legL; P.legR = legR;
    P.armL = armL; P.armR = armR;

    g.position.copy(P.pos);
    scene.add(g);
    P.mesh = g;
}

// ── ENEMIES ───────────────────────────────────────────────
function spawnEnemy(x, z) {
    const g = new THREE.Group();

    const skinM  = new THREE.MeshLambertMaterial({ color: 0xE8A87C });
    const shirtM = new THREE.MeshLambertMaterial({ color: 0x8B0000 });
    const pantsM = new THREE.MeshLambertMaterial({ color: 0x333333 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.82, 0.32), shirtM);
    body.position.y = 0.85;
    body.castShadow = true;
    g.add(body);

    const head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.42, 0.42), skinM);
    head.position.y = 1.46;
    g.add(head);

    const legGeo = new THREE.BoxGeometry(0.24, 0.62, 0.24);
    const legL = new THREE.Mesh(legGeo, pantsM);
    const legR = new THREE.Mesh(legGeo, pantsM);
    legL.position.set(-0.18, 0.31, 0);
    legR.position.set( 0.18, 0.31, 0);
    g.add(legL); g.add(legR);

    const armGeo = new THREE.BoxGeometry(0.2, 0.58, 0.2);
    const armL = new THREE.Mesh(armGeo, shirtM);
    const armR = new THREE.Mesh(armGeo, shirtM);
    armL.position.set(-0.45, 0.82, 0);
    armR.position.set( 0.45, 0.82, 0);
    g.add(armL); g.add(armR);

    // HP bar background
    const hpBgM = new THREE.MeshBasicMaterial({ color: 0x330000 });
    const hpBg  = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.1), hpBgM);
    hpBg.position.y = 2.1;
    g.add(hpBg);

    // HP bar fill
    const hpFillM = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    const hpFill  = new THREE.Mesh(new THREE.PlaneGeometry(0.88, 0.08), hpFillM);
    hpFill.position.set(0, 2.1, 0.01);
    g.add(hpFill);

    g.position.set(x, 0, z);
    scene.add(g);

    const e = {
        mesh: g,
        pos:  new THREE.Vector3(x, 0, z),
        hp: 100, maxHp: 100,
        speed: 2.5 + Math.random() * 1.2,
        state: 'patrol',
        patrol: new THREE.Vector3(x + (Math.random()-0.5)*30, 0, z + (Math.random()-0.5)*30),
        lastAtk: 0,
        lastShot: 0,
        alive: true,
        hpFill, legL, legR, armL, armR,
        wt: 0
    };
    enemies.push(e);
    return e;
}

// ── PICKUPS ───────────────────────────────────────────────
function spawnPickup(x, y, z, type) {
    const cols = { health:0xff4444, ammo:0xffcc00, armor:0x4488ff, money:0x00ff88 };
    const mat  = new THREE.MeshLambertMaterial({ color: cols[type], emissive: cols[type], emissiveIntensity:0.5 });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    scene.add(mesh);
    pickups.push({ mesh, type, pos: new THREE.Vector3(x, y, z), taken: false });
}

// ── LIGHTING ──────────────────────────────────────────────
function setupLights() {
    scene.add(new THREE.AmbientLight(0x404050, 0.85));

    const sun = new THREE.DirectionalLight(0xFFEECC, 1.3);
    sun.position.set(60, 90, 60);

    scene.add(new THREE.HemisphereLight(0x87CEEB, 0x3d7a34, 0.55));

// ── SHOOT ─────────────────────────────────────────────────
function shoot() {
    if (!G.alive) return;
    const now = Date.now();
    const w   = G.weapons[G.curWeapon];
    if (now - G.lastShot < w.rate) return;
    G.lastShot = now;

    if (w.type === 'melee') { doMelee(); return; }
    if (w.ammo <= 0) { showMsg('Sin munición! (R=recargar)'); return; }
    w.ammo--;
    updateHUD();

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    const pellets = w.name === 'Escopeta' ? 7 : 1;

    for (let p = 0; p < pellets; p++) {
        const d = dir.clone();
        if (pellets > 1) {
            d.x += (Math.random()-0.5)*0.18;
            d.y += (Math.random()-0.5)*0.18;
            d.z += (Math.random()-0.5)*0.18;
            d.normalize();
        }
        const bMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.065, 4, 4),
            new THREE.MeshBasicMaterial({ color: 0xFFEE00 })
        );
        const origin = P.pos.clone().add(new THREE.Vector3(0, 1.4, 0));
        bMesh.position.copy(origin);
        scene.add(bMesh);
        bullets.push({ mesh:bMesh, dir:d, spd:45, dist:0, maxDist:w.range, dmg:w.dmg, active:true, enemy:false });
    }
    // muzzle flash
    const fl = new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6), new THREE.MeshBasicMaterial({color:0xFFAA00}));
    const fd  = dir.clone().multiplyScalar(0.9);
    fl.position.copy(P.pos.clone().add(new THREE.Vector3(0,1.4,0)).add(fd));
    scene.add(fl);
    setTimeout(()=>scene.remove(fl), 55);

    // recoil
    P.camV = Math.max(-0.3, P.camV - 0.018);
}

function doMelee() {
    enemies.forEach(e => {
        if (!e.alive) return;
        if (P.pos.distanceTo(e.pos) < G.weapons[0].range) hitEnemy(e, G.weapons[0].dmg);
    });
    // arm swing anim
    if (P.armR) { P.armR.rotation.x = -1.1; setTimeout(()=>{ if(P.armR) P.armR.rotation.x=0; }, 180); }
}

function hitEnemy(e, dmg) {
    if (!e.alive) return;
    e.hp -= dmg;
    e.state = 'chase';
    spawnBlood(e.pos.clone().add(new THREE.Vector3(0,1,0)));
    // update hp bar
    const ratio = Math.max(0, e.hp / e.maxHp);
    e.hpFill.scale.x = ratio;
    e.hpFill.position.x = -0.44*(1-ratio);
    e.hpFill.material.color.setHex(ratio > 0.5 ? 0x00ff00 : ratio > 0.25 ? 0xffaa00 : 0xff2200);
    if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
    e.alive = false;
    scene.remove(e.mesh);
    G.money += 150;
    G.score += 100;
    if (G.wanted < 5) G.wanted++;
    showMsg('+$150  Enemigo eliminado!');
    updateHUD();
    if (Math.random() > 0.45) {
        const types = ['health','ammo','ammo','money'];
        spawnPickup(e.pos.x, 0.5, e.pos.z, types[Math.floor(Math.random()*types.length)]);
    }
    setTimeout(()=>{
        const a = Math.random()*Math.PI*2;
        const r = 25 + Math.random()*35;
        spawnEnemy(Math.cos(a)*r, Math.sin(a)*r);
    }, 12000);
}

function hurtPlayer(dmg) {
    if (!G.alive) return;
    if (G.armor > 0) {
        const ab = Math.min(G.armor, dmg*0.5);
        G.armor -= ab;
        dmg -= ab;
    }
    G.hp = Math.max(0, G.hp - dmg);
    shake = 0.35;
    updateHUD();
    if (G.hp <= 0) playerDie();
}

function playerDie() {
    G.alive = false;
    document.getElementById('dead').style.display = 'flex';
}

function respawn() {
    G.hp = 100; G.armor = 50; G.wanted = 0; G.alive = true;
    P.pos.set(0,0,0); P.vel.set(0,0,0);
    document.getElementById('dead').style.display = 'none';
    showMsg('¡Augusto regresó!');
    updateHUD();
}

// ── ENEMY AI ──────────────────────────────────────────────
function updateEnemies(dt) {
    const now = Date.now();
    enemies.forEach(e => {
        if (!e.alive) return;
        const dist = e.pos.distanceTo(P.pos);

        // billboard hp bars
        e.hpFill.quaternion.copy(camera.quaternion);
        e.mesh.children.forEach(c => {
            if (c.geometry && c.geometry.type === 'PlaneGeometry') c.quaternion.copy(camera.quaternion);
        });

        // State machine
        if (dist < 22) e.state = 'chase';
        if (dist > 35) e.state = 'patrol';

        if (e.state === 'patrol') {
            const pd = e.pos.distanceTo(e.patrol);
            if (pd < 2) {
                e.patrol.set(
                    e.pos.x + (Math.random()-0.5)*40,
                    0,
                    e.pos.z + (Math.random()-0.5)*40
                );
            } else {
                const d = new THREE.Vector3().subVectors(e.patrol, e.pos).normalize();
                e.pos.x += d.x * e.speed * 0.45 * dt;
                e.pos.z += d.z * e.speed * 0.45 * dt;
            }
        } else if (e.state === 'chase') {
            const dir2P = new THREE.Vector3().subVectors(P.pos, e.pos).normalize();
            if (dist < 2.5) {
                // melee attack
                if (now - e.lastAtk > 1100 && G.alive) {
                    e.lastAtk = now;
                    hurtPlayer(12);
                }
            } else {
                // move closer
                e.pos.x += dir2P.x * e.speed * dt;
                e.pos.z += dir2P.z * e.speed * dt;
                // ranged attack
                if (dist < 18 && now - e.lastShot > 1600 && G.alive) {
                    e.lastShot = now;
                    enemyFire(e);
                }
            }
            // face player
            e.mesh.rotation.y = Math.atan2(P.pos.x - e.pos.x, P.pos.z - e.pos.z);
        }

        // Walk animation
        e.wt += dt * 7;
        e.legL.rotation.x = Math.sin(e.wt) * 0.5;
        e.legR.rotation.x = Math.sin(e.wt + Math.PI) * 0.5;

        e.mesh.position.copy(e.pos);
        e.pos.y = 0;
    });
}

function enemyFire(e) {
    const target = P.pos.clone().add(new THREE.Vector3(0,1,0));
    const origin = e.pos.clone().add(new THREE.Vector3(0,1.4,0));
    const dir = new THREE.Vector3().subVectors(target, origin).normalize();
    dir.x += (Math.random()-0.5)*0.22;
    dir.y += (Math.random()-0.5)*0.1;
    dir.z += (Math.random()-0.5)*0.22;
    dir.normalize();

    const bm = new THREE.Mesh(
        new THREE.SphereGeometry(0.065,4,4),
        new THREE.MeshBasicMaterial({color:0xFF6600})
    );
    bm.position.copy(origin);
    scene.add(bm);
    bullets.push({ mesh:bm, dir, spd:32, dist:0, maxDist:22, dmg:10, active:true, enemy:true });
}

// ── UPDATE BULLETS ────────────────────────────────────────
function updateBullets(dt) {
    for (let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        if (!b.active) { scene.remove(b.mesh); bullets.splice(i,1); continue; }

        const mv = b.spd * dt;
        b.mesh.position.addScaledVector(b.dir, mv);
        b.dist += mv;

        if (b.dist > b.maxDist) { b.active=false; continue; }

        if (b.enemy) {
            // hit player
            if (b.mesh.position.distanceTo(P.pos.clone().add(new THREE.Vector3(0,1,0))) < 0.75 && G.alive) {
                hurtPlayer(b.dmg);
                impact(b.mesh.position.clone());
                b.active=false;
            }
        } else {
            // hit enemy
            let hit=false;
            for (const e of enemies) {
                if (!e.alive) continue;
                if (b.mesh.position.distanceTo(e.pos.clone().add(new THREE.Vector3(0,1,0))) < 0.85) {
                    hitEnemy(e, b.dmg);
                    impact(b.mesh.position.clone());
                    b.active=false; hit=true; break;
                }
            }
            // hit building
            if (!hit) {
                const bb = new THREE.Box3().setFromObject(b.mesh);
                for (const box of colBoxes) {
                    if (bb.intersectsBox(box)) { impact(b.mesh.position.clone()); b.active=false; break; }
                }
            }
        }
    }
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnBlood(pos) {
    for (let i=0;i<8;i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.055,4,4), new THREE.MeshBasicMaterial({color:0xBB0000,transparent:true}));
        m.position.copy(pos);
        scene.add(m);
        particles.push({ mesh:m, vel:new THREE.Vector3((Math.random()-.5)*4, Math.random()*4+1,(Math.random()-.5)*4), life:1 });
    }
}

function impact(pos) {
    for (let i=0;i<5;i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4), new THREE.MeshBasicMaterial({color:0xFFAA00,transparent:true}));
        m.position.copy(pos);
        scene.add(m);
        particles.push({ mesh:m, vel:new THREE.Vector3((Math.random()-.5)*5,Math.random()*3,(Math.random()-.5)*5), life:0.5 });
    }
}

function updateParticles(dt) {
    for (let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.life -= dt*2.2;
        p.vel.y -= 12*dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        p.mesh.material.opacity = Math.max(0, p.life);
        if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
    }
}

// ── PICKUPS UPDATE ────────────────────────────────────────
function updatePickups(dt) {
    const t = Date.now()*0.001;
    pickups.forEach(pk => {
        if (pk.taken) return;
        pk.mesh.rotation.y += dt*2.2;
        pk.mesh.position.y = pk.pos.y + Math.sin(t*2 + pk.pos.x)*0.1 + 0.08;
        if (P.pos.distanceTo(pk.pos) < 1.6 && G.alive) grabPickup(pk);
    });
}

function grabPickup(pk) {
    pk.taken = true;
    scene.remove(pk.mesh);
    switch(pk.type) {
        case 'health': G.hp=Math.min(G.maxHp,G.hp+35);   showMsg('❤️ +35 Salud!'); break;
        case 'ammo':
            G.weapons[1].ammo=Math.min(60,G.weapons[1].ammo+18);
            G.weapons[2].ammo=Math.min(24,G.weapons[2].ammo+8);
            G.weapons[3].ammo=Math.min(180,G.weapons[3].ammo+45);
            showMsg('🔫 Munición recargada!'); break;
        case 'armor': G.armor=Math.min(G.maxArmor,G.armor+35); showMsg('🛡️ +35 Armadura!'); break;
        case 'money':
            const earned=60+Math.floor(Math.random()*120);
            G.money+=earned; showMsg('💰 +$'+earned+'!'); break;
    }
    updateHUD();
    setTimeout(()=>{
        const idx=pickups.indexOf(pk);
        if(idx>-1){ spawnPickup(pk.pos.x,pk.pos.y,pk.pos.z,pk.type); pickups.splice(idx,1); }
    }, 18000);
}

// ── PLAYER MOVEMENT ───────────────────────────────────────
function updatePlayer(dt) {
    if (!G.alive) return;

    // Input gathering
    let mx=0, mz=0;
    if (keys['KeyW']||keys['ArrowUp'])    mz -= 1;
    if (keys['KeyS']||keys['ArrowDown'])  mz += 1;
    if (keys['KeyA']||keys['ArrowLeft'])  mx -= 1;
    if (keys['KeyD']||keys['ArrowRight']) mx += 1;

    if (joy.active) { mx += joy.x; mz += joy.y; }

    // Normalize diagonal
    const len = Math.sqrt(mx*mx + mz*mz);
    if (len > 1) { mx/=len; mz/=len; }

    const moving = len > 0.05 || (Math.abs(mx)+Math.abs(mz)) > 0.05;
    const spd = (G.running || keys['ShiftLeft'] || keys['ShiftRight']) ? RUN_SPEED : SPEED;

    // Rotate input by camera heading
    const ch   = P.camH;
    const wx   = mx * Math.cos(ch) - mz * Math.sin(ch);
    const wz   = mx * Math.sin(ch) + mz * Math.cos(ch);

    // Smooth velocity
    P.vel.x = THREE.MathUtils.lerp(P.vel.x, wx*spd, 0.18);
    P.vel.z = THREE.MathUtils.lerp(P.vel.z, wz*spd, 0.18);

    // Gravity
    if (!P.grounded) P.vel.y -= GRAVITY * dt;

    // Move X
    const nx = P.pos.clone(); nx.x += P.vel.x * dt;
    if (!collides(nx)) P.pos.x = nx.x; else P.vel.x = 0;

    // Move Z
    const nz = P.pos.clone(); nz.z += P.vel.z * dt;
    if (!collides(nz)) P.pos.z = nz.z; else P.vel.z = 0;

    // Move Y
    P.pos.y += P.vel.y * dt;
    if (P.pos.y <= 0) {
        P.pos.y = 0; P.vel.y = 0;
        P.grounded = true;
    }

    // World boundary
    P.pos.x = Math.max(-140, Math.min(140, P.pos.x));
    P.pos.z = Math.max(-140, Math.min(140, P.pos.z));

    // Mesh update
    if (P.mesh) {
        P.mesh.position.copy(P.pos);
        if (moving) {
            P.rot = Math.atan2(wx, wz);
        }
        P.mesh.rotation.y = P.rot;

        // Walk anim
        const wt = Date.now()*0.001;
        const ws = spd > 6 ? 11 : 7.5;
        const wa = 0.55;
        if (moving) {
            P.legL.rotation.x = Math.sin(wt*ws)*wa;
            P.legR.rotation.x = Math.sin(wt*ws+Math.PI)*wa;
            P.armL.rotation.x = Math.sin(wt*ws+Math.PI)*0.45;
            P.armR.rotation.x = Math.sin(wt*ws)*0.45;
        } else {
            P.legL.rotation.x = THREE.MathUtils.lerp(P.legL.rotation.x, 0, 0.18);
            P.legR.rotation.x = THREE.MathUtils.lerp(P.legR.rotation.x, 0, 0.18);
            P.armL.rotation.x = THREE.MathUtils.lerp(P.armL.rotation.x, 0, 0.18);
            P.armR.rotation.x = THREE.MathUtils.lerp(P.armR.rotation.x, 0, 0.18);
        }
    }
}

function collides(testPos) {
    const box = new THREE.Box3(
        new THREE.Vector3(testPos.x - RADIUS, testPos.y,          testPos.z - RADIUS),
        new THREE.Vector3(testPos.x + RADIUS, testPos.y + HEIGHT, testPos.z + RADIUS)
    );
    for (const b of colBoxes) {
        if (box.intersectsBox(b)) return true;
    }
    return false;
}

function jump() {
    if (P.grounded) {
        P.vel.y = JUMP_FORCE;
        P.grounded = false;
    }
}

// ── CAMERA ────────────────────────────────────────────────
let shake = 0;
function updateCamera(dt) {
    P.camV = Math.max(-0.25, Math.min(0.85, P.camV));
    const tx = P.pos.x - Math.sin(P.camH)*Math.cos(P.camV)*P.camDist;
    const ty = P.pos.y + P.camHeight + Math.sin(P.camV)*P.camDist;
    const tz = P.pos.z - Math.cos(P.camH)*Math.cos(P.camV)*P.camDist;

    camera.position.x = THREE.MathUtils.lerp(camera.position.x, tx, 0.14);
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ty, 0.14);
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, tz, 0.14);

    if (shake > 0) {
        camera.position.x += (Math.random()-.5)*shake;
        camera.position.y += (Math.random()-.5)*shake;
        shake *= 0.75;
        if (shake < 0.01) shake = 0;
    }
    camera.lookAt(P.pos.clone().add(new THREE.Vector3(0, 1.3, 0)));
}

// ── HUD ───────────────────────────────────────────────────
function updateHUD() {
    document.getElementById('health-fill').style.width = (G.hp/G.maxHp*100)+'%';
    document.getElementById('hp-val').textContent = Math.floor(G.hp);
    document.getElementById('armor-fill').style.width = (G.armor/G.maxArmor*100)+'%';
    document.getElementById('armor-val').textContent = Math.floor(G.armor);
    document.getElementById('money').textContent = '$'+G.money.toLocaleString();
    const w = G.weapons[G.curWeapon];
    document.getElementById('weapon-name').textContent = w.name;
    document.getElementById('ammo-count').textContent = w.ammo===Infinity ? '∞' : w.ammo;
    for(let i=1;i<=5;i++) document.getElementById('st'+i).className='star'+(i<=G.wanted?' on':'');
}

let msgTimer;
function showMsg(txt) {
    const el = document.getElementById('msg');
    el.textContent = txt;
    el.style.opacity = '1';
    clearTimeout(msgTimer);
    msgTimer = setTimeout(()=>el.style.opacity='0', 3000);
}

// ── MINIMAP ───────────────────────────────────────────────
function drawMinimap() {
    const c  = document.getElementById('mm');
    const cx = c.getContext('2d');
    const W=130, H=130, CX=W/2, CY=H/2, SC=1.4;
    cx.clearRect(0,0,W,H);
    cx.fillStyle='rgba(0,20,0,0.88)';
    cx.beginPath(); cx.arc(CX,CY,CX,0,Math.PI*2); cx.fill();
    cx.save();
    cx.beginPath(); cx.arc(CX,CY,CX-2,0,Math.PI*2); cx.clip();

    // roads
    cx.fillStyle='#444';
    cx.fillRect(0,CY-5,W,10);
    cx.fillRect(CX-5,0,10,H);

    // enemies
    enemies.forEach(e=>{
        if(!e.alive)return;
        const ex=CX+(e.pos.x-P.pos.x)*SC;
        const ey=CY+(e.pos.z-P.pos.z)*SC;
        cx.fillStyle='#ff3333';
        cx.beginPath(); cx.arc(ex,ey,3.5,0,Math.PI*2); cx.fill();
    });

    // pickups
    pickups.forEach(pk=>{
        if(pk.taken)return;
        const px=CX+(pk.pos.x-P.pos.x)*SC;
        const py=CY+(pk.pos.z-P.pos.z)*SC;
        const cols={health:'#ff6666',ammo:'#ffcc00',armor:'#6688ff',money:'#00ff88'};
        cx.fillStyle=cols[pk.type]||'#fff';
        cx.fillRect(px-2.5,py-2.5,5,5);
    });

    // player dot
    cx.fillStyle='#00ff88';
    cx.beginPath(); cx.arc(CX,CY,5.5,0,Math.PI*2); cx.fill();
    // direction
    cx.strokeStyle='#00ff88'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(CX,CY);
    cx.lineTo(CX-Math.sin(P.rot)*12, CY-Math.cos(P.rot)*12);
    cx.stroke();

    cx.restore();
    cx.strokeStyle='#ffcc00'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(CX,CY,CX-1,0,Math.PI*2); cx.stroke();
}

// ── INPUT ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code==='Space')      { e.preventDefault(); jump(); }
    if (e.code==='KeyG')       { G.curWeapon=(G.curWeapon+1)%G.weapons.length; showMsg('Arma: '+G.weapons[G.curWeapon].name); updateHUD(); }
    if (e.code==='KeyR')       { const w=G.weapons[G.curWeapon]; if(w.type==='gun'){w.ammo=w.maxAmmo; showMsg('🔄 Recargado!'); updateHUD();} }
    if (e.code==='KeyF')       { shoot(); }
    if (e.code==='KeyE')       { shoot(); }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

// Mouse
document.addEventListener('mousemove', e => {
    if (!mouse.locked) return;
    P.camH -= e.movementX * 0.003;
    P.camV += e.movementY * 0.003;
});

renderer.domElement.addEventListener('click', () => {
    if (!mouse.locked) renderer.domElement.requestPointerLock();
    else shoot();
});

renderer.domElement.addEventListener('mousedown', e => {
    if (e.button === 0 && mouse.locked) { G.shooting = true; shoot(); }
});

document.addEventListener('mouseup', e => {
    if (e.button === 0) G.shooting = false;
});

// Manejo del bloqueo del puntero (Pointer Lock)
document.addEventListener('pointerlockchange', () => {
    mouse.locked = (document.pointerLockElement === renderer.domElement);
});

// ── CONTROLES MÓVILES (TOUCH) ─────────────────────────────
const joy = { active: false, x: 0, y: 0, id: null };
const joyBase = document.getElementById('joy-base');
const joyKnob = document.getElementById('joy-knob');
const camZone = document.getElementById('cam-zone');

// Joystick de movimiento
joyBase.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joy.id = t.identifier;
    joy.active = true;
    updateJoy(t);
}, { passive: false });

joyBase.addEventListener('touchmove', e => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joy.id) {
            updateJoy(e.changedTouches[i]);
            break;
        }
    }
}, { passive: false });

const endJoy = e => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joy.id) {
            joy.active = false;
            joy.id = null;
            joy.x = 0; joy.y = 0;
            joyKnob.style.transform = `translate(-50%, -50%)`;
            break;
        }
    }
};
joyBase.addEventListener('touchend', endJoy);
joyBase.addEventListener('touchcancel', endJoy);

function updateJoy(t) {
    const rect = joyBase.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = t.clientX - cx;
    let dy = t.clientY - cy;
    const maxR = rect.width / 2;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > maxR) {
        dx = (dx / dist) * maxR;
        dy = (dy / dist) * maxR;
    }
    joy.x = dx / maxR;
    joy.y = dy / maxR;
    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

// Zona táctil de la cámara
let camTouchId = null;
let lastCamX = 0, lastCamY = 0;

camZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    camTouchId = t.identifier;
    lastCamX = t.clientX;
    lastCamY = t.clientY;
}, { passive: false });

camZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        const t = e.changedTouches[i];
        if (t.identifier === camTouchId) {
            const dx = t.clientX - lastCamX;
            const dy = t.clientY - lastCamY;
            P.camH -= dx * 0.005;
            P.camV += dy * 0.005;
            lastCamX = t.clientX;
            lastCamY = t.clientY;
            break;
        }
    }
}, { passive: false });

const endCam = e => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === camTouchId) {
            camTouchId = null;
            break;
        }
    }
};
camZone.addEventListener('touchend', endCam);
camZone.addEventListener('touchcancel', endCam);

// Botones de acción móviles
document.getElementById('btn-fire').addEventListener('touchstart', e => { e.preventDefault(); shoot(); G.shooting = true; });
document.getElementById('btn-fire').addEventListener('touchend', e => { e.preventDefault(); G.shooting = false; });
document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); jump(); });
document.getElementById('btn-swap').addEventListener('touchstart', e => { 
    e.preventDefault(); 
    G.curWeapon = (G.curWeapon + 1) % G.weapons.length; 
    showMsg('Arma: ' + G.weapons[G.curWeapon].name); 
    updateHUD(); 
});
document.getElementById('btn-run').addEventListener('touchstart', e => { e.preventDefault(); G.running = true; });
document.getElementById('btn-run').addEventListener('touchend', e => { e.preventDefault(); G.running = false; });

// Botón de Respawn
document.getElementById('btn-respawn').addEventListener('click', respawn);

// Redimensionamiento de ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── BUCLE PRINCIPAL DEL JUEGO (GAME LOOP) ─────────────────
let lastTime = performance.now();

function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.1); // Limitar el delta time para evitar saltos bruscos
    lastTime = now;

    // Fuego automático si el arma lo permite (AK-47)
    if (G.shooting && G.weapons[G.curWeapon].type === 'gun' && G.weapons[G.curWeapon].name !== 'Escopeta' && G.weapons[G.curWeapon].name !== 'Pistola') {
        shoot(); 
    }

    // Actualizaciones
    updatePlayer(dt);
    updateCamera(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    updatePickups(dt);
    drawMinimap();

    // Renderizado final
    renderer.render(scene, camera);
}

// ── INICIALIZACIÓN ────────────────────────────────────────
buildWorld();
setupLights();
createPlayer();
updateHUD();

// Ocultar pantalla de carga e iniciar el bucle
setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    lastTime = performance.now();
    animate();
}, 1500); // Pequeña demora para asegurar que los shaders compilen y la UI se actualice

} // Cierre de la función startGame()
</script>
</body>
